<section class="page">
  <div class="page-header">
    <h2>Bevásárlólisták</h2>
  </div>

  <div class="create-panel">
    <input
      type="text"
      [(ngModel)]="newListName"
      placeholder="Új lista neve"
    />
    <button (click)="createList()">Létrehozás</button>
  </div>

  @if (isLoading) {
    <p>Betöltés...</p>
  }

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

<div class="list-grid">
  @for (list of lists; track list.id) {
    <div class="list-card">
      <h3>{{ list.name }}</h3>
      <p>Létrehozva: {{ list.createdAt | date:'short' }}</p>

      <div class="list-actions">
        <button class="open-button" [routerLink]="['/lists', list.id]">Megnyitás</button>

        <button class="delete-button" (click)="deleteList(list.id)">
          Törlés
        </button>
      </div>
    </div>
  }
</div>


</section>
